<div class="row">
  <div class="card col-md-6 offset-md-3">
    <div class="card-header {{ tipoDireccion.id ? 'bg-warning' : 'bg-info' }} text-white">
      <h4 class="card-title m-b-0">
        {{ tipoDireccion.id ? 'Editar' : 'Crear' }} Tipo de Dirección
      </h4>
    </div>
    <div class="card-body {{ tipoDireccion.id ? 'border-warning' : 'border-info' }}">
        <form [formGroup]="tipoDireccionForm" (ngSubmit)="onSubmit()">
          <div class="row">
            <!-- Título -->
            <div class="col-md-12 mb-3">
              <label for="sTipoDireccion" class="form-label">Título *</label>
              <input type="text" 
                    class="form-control" 
                    id="sTipoDireccion"
                    formControlName="sTipoDireccion"
                    [ngClass]="{'is-invalid': isFieldInvalid('sTipoDireccion')}"
                    placeholder="Ingrese el título del tipo de dirección">
              @if (isFieldInvalid('sTipoDireccion')) {
                <div class="invalid-feedback">
                  {{ getFieldError('sTipoDireccion') }}
                </div>
              }
            </div>
          </div>

          <!-- Botones de acción -->
          <div class="row">
            <div class="col-12">
              <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" (click)="onCancel()">
                  <i class="fa fa-times"></i> Cancelar
                </button>
                <button type="submit" class="btn btn-primary" [disabled]="tipoDireccionForm.invalid">
                  <i class="fa fa-save"></i> Guardar
                </button>
              </div>
            </div>
          </div>
        </form>
    </div>
  </div>
</div>
